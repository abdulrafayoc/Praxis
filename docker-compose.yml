version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: praxis-postgres
    environment:
      POSTGRES_DB: praxis
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis -d praxis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - praxis-network

  redis:
    image: redis:7-alpine
    container_name: praxis-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - praxis-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: praxis-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      - ALLOW_RESET=TRUE
    networks:
      - praxis-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxis-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/prompts:/app/prompts
      - ./backend/filler_audio:/app/filler_audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - praxis-network
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxis-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - praxis-network
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxis-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - praxis-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: praxis-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - praxis-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  praxis-network:
    driver: bridge
